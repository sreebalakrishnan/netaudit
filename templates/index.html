<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NetAudit</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1a1f26;
    --border: #232932;
    --border-2: #2d343f;
    --text: #e6e8eb;
    --muted: #8a93a0;
    --muted-2: #5e6776;
    --accent: #6ee7b7;
    --accent-2: #34d399;
    --danger: #f87171;
    --warn: #fbbf24;
    --info: #60a5fa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  header { padding: 28px 32px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  header h1 span { color: var(--accent); }
  main { padding: 24px 32px 64px; max-width: 1200px; margin: 0 auto; }
  .row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  button { background: var(--accent); color: #062019; border: 0; padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background .15s; }
  button:hover:not(:disabled) { background: var(--accent-2); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .panel h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; }
  .status { display: inline-flex; gap: 8px; align-items: center; font-size: 13px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.running { background: var(--warn); animation: pulse 1.2s infinite; }
  .dot.done { background: var(--accent); }
  .dot.error { background: var(--danger); }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  .scans { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
  .scan-row { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 6px; background: var(--panel-2); border: 1px solid transparent; cursor: pointer; transition: border-color .15s; font-size: 13px; }
  .scan-row:hover { border-color: var(--border-2); }
  .scan-row.active { border-color: var(--accent); }
  .scan-meta { display: flex; gap: 10px; align-items: center; }
  .scan-meta .id { color: var(--muted); font-family: "SF Mono", monospace; }

  /* Verdict headline */
  .verdict { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; margin-bottom: 12px; border-left: 4px solid var(--muted-2); }
  .verdict.ok { border-left-color: var(--accent); }
  .verdict.warn { border-left-color: var(--warn); }
  .verdict.danger { border-left-color: var(--danger); }
  .verdict .head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .verdict .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted-2); }
  .verdict.ok .dot { background: var(--accent); }
  .verdict.warn .dot { background: var(--warn); }
  .verdict.danger .dot { background: var(--danger); }
  .verdict .headline { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .verdict .ssid { font-size: 12px; color: var(--muted); margin-left: auto; }
  .verdict ul { margin: 8px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .verdict li { font-size: 14px; color: var(--text); padding-left: 18px; position: relative; }
  .verdict li::before { content: '·'; position: absolute; left: 6px; color: var(--muted); font-weight: 700; }

  /* Safety strip */
  .safety { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .tile { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; }
  .tile .icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .tile .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; }
  .tile .value { font-size: 14px; font-weight: 600; margin-top: 2px; line-height: 1.2; word-break: break-word; }
  .tile .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tile.ok { border-color: rgba(110, 231, 183, 0.4); }
  .tile.warn { border-color: rgba(251, 191, 36, 0.5); }
  .tile.danger { border-color: rgba(248, 113, 113, 0.5); }
  .tile .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 4px; }
  .tile.ok .badge { background: rgba(110, 231, 183, 0.15); color: var(--accent); }
  .tile.warn .badge { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
  .tile.danger .badge { background: rgba(248, 113, 113, 0.15); color: var(--danger); }
  .skeleton { color: var(--muted-2); }

  /* Stats strip */
  .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: border-color .15s, background .15s; user-select: none; }
  .stat:hover { border-color: var(--border-2); }
  .stat.active { border-color: var(--accent); background: var(--panel-2); }
  .stat .icon { font-size: 20px; line-height: 1; }
  .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; }
  .stat .count { font-size: 18px; font-weight: 700; }

  /* Device cards grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; transition: border-color .15s; cursor: pointer; }
  .card:hover { border-color: var(--border-2); }
  .card.expanded { border-color: var(--accent); }
  .card-head { display: flex; align-items: flex-start; gap: 12px; }
  .card-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .card-title { flex: 1; min-width: 0; }
  .card-title .model { font-weight: 600; font-size: 14px; }
  .card-title .brand { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .conf { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  .conf.high { background: rgba(110, 231, 183, 0.15); color: var(--accent); }
  .conf.medium { background: rgba(96, 165, 250, 0.15); color: var(--info); }
  .conf.low { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
  .card-body { margin-top: 10px; font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
  .card-body .mono { font-family: "SF Mono", ui-monospace, Menlo, monospace; color: var(--text); }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .chip { font-size: 10px; padding: 2px 7px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--border-2); color: var(--muted); font-family: "SF Mono", monospace; }
  .chip.port { color: var(--info); border-color: rgba(96, 165, 250, 0.3); }
  .card-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-2); font-size: 11px; color: var(--muted); display: none; }
  .card.expanded .card-detail { display: block; }
  .card-detail .row { gap: 6px; margin-bottom: 4px; }
  .card-detail strong { color: var(--text); font-weight: 500; }
</style>
</head>
<body>
<header>
  <h1>Net<span>Audit</span></h1>
  <div class="status" id="status"><span class="dot"></span><span id="status-text">idle</span></div>
</header>
<main>
  <div class="row">
    <button id="scan-btn">▶ Scan Devices</button>
    <button id="safety-btn" style="background: var(--panel-2); color: var(--text); border: 1px solid var(--border-2);">⟳ Check Network</button>
    <span class="status" id="meta"></span>
  </div>

  <div id="safety-wrap">
    <div id="verdict-host"></div>
    <div class="safety" id="safety"></div>
  </div>

  <div class="panel">
    <h2>Recent scans</h2>
    <div class="scans" id="scans"></div>
  </div>

  <div id="results" style="display:none;">
    <div class="stats" id="stats"></div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="panel" id="placeholder">
    <div class="empty">No scan selected. Click <strong>Start Scan</strong> above.</div>
  </div>
</main>

<script>
const $ = (id) => document.getElementById(id);
let currentScanId = null;
let pollTimer = null;
let activeFilter = null;
let devicesCache = [];

const TYPE_META = {
  phone:        { icon: '📱', label: 'Phones' },
  tablet:       { icon: '📋', label: 'Tablets' },
  computer:     { icon: '💻', label: 'Computers' },
  tv:           { icon: '📺', label: 'TVs / Cast' },
  speaker:      { icon: '🔊', label: 'Speakers' },
  printer:      { icon: '🖨️', label: 'Printers' },
  router:       { icon: '🛜', label: 'Router' },
  nas:          { icon: '💾', label: 'NAS' },
  iot:          { icon: '💡', label: 'IoT' },
  game_console: { icon: '🎮', label: 'Consoles' },
  unknown:      { icon: '❓', label: 'Unknown' },
};

async function api(path, opts = {}) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status} ${path}`);
  return r.json();
}

function setStatus(state, text) {
  const dot = $('status').querySelector('.dot');
  dot.className = 'dot ' + (state || '');
  $('status-text').textContent = text;
}

function renderScans(scans) {
  const c = $('scans');
  if (!scans.length) { c.innerHTML = '<div class="empty">No scans yet.</div>'; return; }
  c.innerHTML = scans.map(s => `
    <div class="scan-row ${s.id === currentScanId ? 'active' : ''}" data-id="${s.id}">
      <div class="scan-meta">
        <span class="dot ${s.status === 'done' ? 'done' : s.status === 'running' ? 'running' : 'error'}"></span>
        <span class="id">#${s.id}</span>
        <span>${new Date(s.started_at).toLocaleString()}</span>
      </div>
      <div class="scan-meta">
        <span style="color: var(--muted);">${s.subnet}</span>
        <strong>${s.device_count} devices</strong>
      </div>
    </div>
  `).join('');
  c.querySelectorAll('.scan-row').forEach(el => {
    el.onclick = () => selectScan(parseInt(el.dataset.id, 10));
  });
}

function renderStats(devices) {
  const counts = {};
  for (const d of devices) {
    const t = d.device_type || 'unknown';
    counts[t] = (counts[t] || 0) + 1;
  }
  const order = ['phone', 'tablet', 'computer', 'tv', 'speaker', 'printer', 'router', 'nas', 'iot', 'game_console', 'unknown'];
  const c = $('stats');
  const items = order
    .filter(t => counts[t])
    .map(t => {
      const meta = TYPE_META[t] || { icon: '❓', label: t };
      const active = activeFilter === t ? 'active' : '';
      return `<div class="stat ${active}" data-type="${t}">
        <span class="icon">${meta.icon}</span>
        <div>
          <div class="label">${meta.label}</div>
          <div class="count">${counts[t]}</div>
        </div>
      </div>`;
    });
  // "All" pill on the left
  const allActive = activeFilter === null ? 'active' : '';
  c.innerHTML = `<div class="stat ${allActive}" data-type="__all"><span class="icon">📡</span><div><div class="label">All</div><div class="count">${devices.length}</div></div></div>` + items.join('');
  c.querySelectorAll('.stat').forEach(el => {
    el.onclick = () => {
      const t = el.dataset.type;
      activeFilter = (t === '__all') ? null : (activeFilter === t ? null : t);
      renderStats(devicesCache);
      renderGrid(devicesCache);
    };
  });
}

function renderGrid(devices) {
  const c = $('grid');
  const filtered = activeFilter ? devices.filter(d => (d.device_type || 'unknown') === activeFilter) : devices;
  if (!filtered.length) { c.innerHTML = '<div class="empty">No devices match this filter.</div>'; return; }
  c.innerHTML = filtered.map((d, i) => {
    const meta = TYPE_META[d.device_type] || TYPE_META.unknown;
    const services = (d.services || []).slice(0, 4).map(s => `<span class="chip">${s.replace(/-tcp$|-udp$/, '')}</span>`).join('');
    const ports = (d.open_ports || []).slice(0, 6).map(p => `<span class="chip port">${p}</span>`).join('');
    const ssdpLines = (d.ssdp || []).map(s => `<div class="row"><strong>SSDP:</strong> ${s}</div>`).join('');
    const allSvc = (d.services || []).join(', ') || '—';
    const allPorts = (d.open_ports || []).join(', ') || '—';
    return `<div class="card" data-i="${i}">
      <div class="card-head">
        <div class="card-icon">${meta.icon}</div>
        <div class="card-title">
          <div class="model">${d.model || 'Unknown device'}</div>
          <div class="brand">${d.brand || d.vendor || '—'}</div>
        </div>
        <span class="conf ${d.confidence}">${d.confidence}</span>
      </div>
      <div class="card-body">
        <div class="mono">${d.ip}</div>
        <div class="mono" style="font-size: 11px;">${d.mac || '—'}</div>
        ${d.hostname ? `<div style="color: var(--muted-2); font-size: 11px;">${d.hostname}</div>` : ''}
      </div>
      <div class="chips">${ports}${services}</div>
      <div class="card-detail">
        <div class="row"><strong>Services:</strong> ${allSvc}</div>
        <div class="row"><strong>Ports:</strong> ${allPorts}</div>
        ${ssdpLines}
        ${d.vendor && d.vendor !== d.brand ? `<div class="row"><strong>OUI vendor:</strong> ${d.vendor}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  c.querySelectorAll('.card').forEach(el => {
    el.onclick = () => el.classList.toggle('expanded');
  });
}

async function refreshScans() {
  const scans = await api('/api/scans');
  renderScans(scans);
}

function tile(severity, icon, label, value, sub, badge) {
  const sevClass = severity || '';
  const badgeHtml = badge ? `<span class="badge">${badge}</span>` : '';
  const subHtml = sub ? `<div class="sub">${sub}</div>` : '';
  return `<div class="tile ${sevClass}">
    <div class="icon">${icon}</div>
    <div>
      <div class="label">${label}${badgeHtml}</div>
      <div class="value">${value}</div>
      ${subHtml}
    </div>
  </div>`;
}

function renderVerdict(v) {
  const host = $('verdict-host');
  if (!v) { host.innerHTML = ''; return; }
  const lis = (v.sentences || []).map(s => `<li>${s}</li>`).join('');
  host.innerHTML = `<div class="verdict ${v.severity}">
    <div class="head">
      <div class="dot"></div>
      <div class="headline">${v.headline}</div>
      ${v.ssid ? `<div class="ssid">on "${v.ssid}"</div>` : ''}
    </div>
    <ul>${lis}</ul>
  </div>`;
}

function renderSafety(n) {
  renderVerdict(n.verdict);
  const c = $('safety');
  const tiles = [];

  // Wi-Fi
  if (n.wifi) {
    const enc = n.wifi.encryption || 'Unknown';
    const ssid = n.wifi.ssid && n.wifi.ssid !== '<redacted>' ? n.wifi.ssid : 'Current network';
    const isOpen = /open|none/i.test(enc);
    const isWeak = /wep|wpa[^23]/i.test(enc);
    const sev = isOpen ? 'danger' : isWeak ? 'warn' : 'ok';
    const badge = isOpen ? 'OPEN' : isWeak ? 'WEAK' : 'OK';
    tiles.push(tile(sev, '📶', 'Wi-Fi', ssid, `${enc}${n.wifi.rssi ? ' · ' + n.wifi.rssi.split(' / ')[0] : ''}`, badge));
  }

  // Captive portal
  if (n.captive_portal) {
    const s = n.captive_portal.status;
    if (s === 'open') tiles.push(tile('ok', '🌐', 'Internet', 'Open', n.captive_portal.note, 'OK'));
    else if (s === 'captive') tiles.push(tile('warn', '🚧', 'Internet', 'Captive portal', 'Sign-in required', 'PORTAL'));
    else tiles.push(tile('danger', '🚫', 'Internet', 'No outbound', n.captive_portal.note, 'OFFLINE'));
  }

  // Public IP / geo
  if (n.public) {
    if (n.public.ip) {
      const loc = [n.public.city, n.public.country].filter(Boolean).join(', ');
      tiles.push(tile('', '🌍', 'Public IP', n.public.ip, `${loc}${n.public.org ? ' · ' + n.public.org.split(' ').slice(0, 3).join(' ') : ''}`));
    } else {
      tiles.push(tile('warn', '🌍', 'Public IP', 'Unknown', n.public.error || ''));
    }
  }

  // DNS
  if (n.dns) {
    const cls = n.dns.classification || {};
    const sevMap = { 'public': 'ok', 'gateway': 'ok', 'private-other': 'warn', 'external': 'warn', 'unknown': '' };
    const sev = sevMap[cls.status] || '';
    const primary = n.dns.resolvers[0] || '—';
    tiles.push(tile(sev, '🧭', 'DNS', primary, cls.note || ''));
  }

  // Speed
  if (n.speed) {
    if (n.speed.down_mbps != null) {
      const sev = n.speed.down_mbps < 5 ? 'warn' : 'ok';
      tiles.push(tile(sev, '⚡', 'Download', `${n.speed.down_mbps} Mbps`, `${(n.speed.bytes/1e6).toFixed(1)} MB in ${n.speed.elapsed_s}s`));
    } else {
      tiles.push(tile('warn', '⚡', 'Download', 'Failed', n.speed.error || ''));
    }
  }

  // Latency + jitter
  if (n.latency) {
    const inet = n.latency.internet || {};
    const gw = n.latency.gateway || {};
    if (inet.avg_ms != null) {
      const jit = inet.jitter_ms;
      const sev = (inet.avg_ms > 250 || (jit != null && jit > 40)) ? 'warn' : 'ok';
      const gwLine = gw.avg_ms != null ? ` · gw ${gw.avg_ms.toFixed(0)}ms` : '';
      const jitLine = jit != null ? ` · jitter ${jit.toFixed(0)}ms` : '';
      tiles.push(tile(sev, '📡', 'Latency', `${inet.avg_ms.toFixed(0)} ms`, `to 1.1.1.1${jitLine}${gwLine}`));
    }
  }

  // ARP anomaly
  if (n.arp_check) {
    const sev = n.arp_check.severity === 'warn' ? 'warn' : 'ok';
    const findings = n.arp_check.findings || [];
    const summary = sev === 'ok' ? 'No anomalies' : `${findings.length} flagged`;
    tiles.push(tile(sev, sev === 'ok' ? '🛡️' : '⚠️', 'ARP check', summary, findings[0] || ''));
  }

  // Path / hops
  if (n.hops) {
    const h = n.hops;
    if (h.error) {
      tiles.push(tile('warn', '🛣️', 'Path', 'Trace failed', h.error.substring(0, 40)));
    } else if (h.count) {
      const sev = h.count > 15 ? 'warn' : 'ok';
      const summary = h.reached ? `${h.count} hops` : `${h.count}+ hops`;
      const sub = h.reached ? 'reached 1.1.1.1' : `to 1.1.1.1 · ICMP filtered after hop ${h.hops.filter(x => x.ip).length}`;
      tiles.push(tile(sev, '🛣️', 'Path', summary, sub));
    }
  }

  // VPN
  if (n.vpn) {
    if (n.vpn.active) {
      tiles.push(tile('ok', '🔒', 'VPN', 'Active', `via ${n.vpn.interface}`, 'ON'));
    } else {
      tiles.push(tile('', '🔓', 'VPN', 'Not active', n.vpn.interface ? `default via ${n.vpn.interface}` : ''));
    }
  }

  // Apple Private Relay
  if (n.private_relay) {
    if (n.private_relay.available) {
      tiles.push(tile('', '🍎', 'Private Relay', 'Available', n.private_relay.note));
    } else {
      tiles.push(tile('', '🍎', 'Private Relay', 'Not detected', n.private_relay.note));
    }
  }

  c.innerHTML = tiles.join('') || '<div class="empty">Loading network safety…</div>';
}

function renderSafetySkeleton() {
  $('safety').innerHTML = Array(6).fill(0).map(() => `
    <div class="tile">
      <div class="icon skeleton">⏳</div>
      <div><div class="label">checking…</div><div class="value skeleton">—</div></div>
    </div>`).join('');
}

async function refreshSafety() {
  $('safety-btn').disabled = true;
  renderSafetySkeleton();
  try {
    const n = await api('/api/network/check');
    renderSafety(n);
  } catch (e) {
    $('safety').innerHTML = `<div class="empty">Safety check failed: ${e.message}</div>`;
  } finally {
    $('safety-btn').disabled = false;
  }
}

async function selectScan(id) {
  currentScanId = id;
  const s = await api(`/api/scan/${id}`);
  devicesCache = s.devices || [];
  $('placeholder').style.display = devicesCache.length || s.status === 'running' ? 'none' : 'block';
  $('results').style.display = devicesCache.length || s.status === 'running' ? 'block' : 'none';
  renderStats(devicesCache);
  renderGrid(devicesCache);
  refreshScans();
  if (s.status === 'running') {
    setStatus('running', `scan #${id} running…`);
    clearTimeout(pollTimer);
    pollTimer = setTimeout(() => selectScan(id), 2000);
  } else if (s.status === 'done') {
    setStatus('done', `scan #${id} complete · ${s.device_count} devices · ${s.subnet}`);
  } else {
    setStatus('error', s.status);
  }
}

$('scan-btn').onclick = async () => {
  $('scan-btn').disabled = true;
  refreshSafety();  // run safety in parallel with the device scan
  try {
    const { scan_id } = await api('/api/scan', { method: 'POST' });
    activeFilter = null;
    await selectScan(scan_id);
  } finally {
    $('scan-btn').disabled = false;
  }
};

$('safety-btn').onclick = refreshSafety;

refreshScans();
refreshSafety();
</script>
</body>
</html>
